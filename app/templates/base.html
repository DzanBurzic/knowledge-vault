<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#050505">
<title>{% block title %}Knowledge Vault{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css?v={{ static_v }}">
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <symbol id="ic-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></symbol>
  <symbol id="ic-chip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3"/></symbol>
  <symbol id="ic-briefcase" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></symbol>
  <symbol id="ic-coffee" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4z"/><path d="M6 1v3M10 1v3M14 1v3"/></symbol>
  <symbol id="ic-map" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></symbol>
  <symbol id="ic-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1.1-1.1a5.5 5.5 0 0 0-7.8 7.8l1.1 1.1L12 21.2l7.8-7.7 1.1-1.1a5.5 5.5 0 0 0 0-7.8z"/></symbol>
  <symbol id="ic-flask" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6M10 3v6l-5.2 8.6A2 2 0 0 0 6.5 21h11a2 2 0 0 0 1.7-3.4L14 9V3M7.5 14h9"/></symbol>
  <symbol id="ic-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></symbol>
  <symbol id="ic-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></symbol>
  <symbol id="ic-music" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></symbol>
  <symbol id="ic-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4z"/></symbol>
  <symbol id="ic-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></symbol>
  <symbol id="ic-tag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20.6 13.4l-7.2 7.2a2 2 0 0 1-2.8 0L2 12V2h10l8.6 8.6a2 2 0 0 1 0 2.8z"/><path d="M7 7h.01"/></symbol>
  <symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></symbol>
  <symbol id="ic-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M10 11v6M14 11v6"/></symbol>
  <symbol id="ic-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></symbol>
  <symbol id="ic-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M12 18h.01"/></symbol>
  <symbol id="ic-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
</svg>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <svg width="30" height="30" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <circle cx="16" cy="16" r="15" fill="#101010" stroke="#303030"/>
        <line x1="16" y1="16" x2="8" y2="9"  stroke="#8f8f8f" stroke-opacity="0.4"/>
        <line x1="16" y1="16" x2="24" y2="11" stroke="#8f8f8f" stroke-opacity="0.4"/>
        <line x1="16" y1="16" x2="10" y2="24" stroke="#8f8f8f" stroke-opacity="0.4"/>
        <line x1="16" y1="16" x2="23" y2="22" stroke="#8f8f8f" stroke-opacity="0.4"/>
        <circle cx="8"  cy="9"  r="2" fill="#737373"/>
        <circle cx="24" cy="11" r="2" fill="#737373"/>
        <circle cx="10" cy="24" r="2" fill="#737373"/>
        <circle cx="23" cy="22" r="2.4" fill="#a3a3a3"/>
        <circle cx="16" cy="16" r="3.2" fill="#fcfcfc"/>
      </svg>
      <div>
        <div class="brand-name">Knowledge Vault</div>
        <div class="brand-sub">your constellation</div>
      </div>
    </div>
    <nav aria-label="Primary">
      <a href="/" {% if request.url.path == '/' %}class="active" aria-current="page"{% endif %}><span class="nav-ico" aria-hidden="true">✦</span> <span class="nav-label">Recently added</span></a>
      <a href="/add" {% if request.url.path == '/add' %}class="active" aria-current="page"{% endif %}><span class="nav-ico" aria-hidden="true">＋</span> <span class="nav-label">Add</span></a>
      <a href="/browse" {% if request.url.path.startswith('/browse') or request.url.path.startswith('/category') %}class="active" aria-current="page"{% endif %}><span class="nav-ico" aria-hidden="true">◈</span> <span class="nav-label">Browse</span></a>
      <a href="/graph" {% if request.url.path == '/graph' %}class="active" aria-current="page"{% endif %}><span class="nav-ico" aria-hidden="true">✧</span> <span class="nav-label">Graph</span></a>
      <a href="/search" {% if request.url.path == '/search' %}class="active" aria-current="page"{% endif %}><span class="nav-ico" aria-hidden="true">⌕</span> <span class="nav-label">Search</span></a>
      <a href="/settings" {% if request.url.path == '/settings' %}class="active" aria-current="page"{% endif %}><span class="nav-ico" aria-hidden="true">⚙</span> <span class="nav-label">Settings</span></a>
    </nav>
    <div class="status-area" id="status-area" aria-live="polite">
      <h3>Status</h3>
      <div class="status-row">Queue: <span id="st-queue">…</span></div>
      <div class="status-row" id="st-current-row" style="display:none">
        Working on: <span id="st-current"></span>
        <span class="stage-badge" id="st-stage"></span>
      </div>
      <div class="status-row">Ollama: <span id="st-ollama">…</span></div>
      <div class="status-row">Inbox: <span id="st-inbox">…</span></div>
      <div class="status-row">Phone library: <span id="st-cloud">…</span></div>
      <div class="status-row muted">Last poll: <span id="st-poll">never</span></div>
      <div class="status-warning" id="st-warning" style="display:none"></div>
    </div>
  </aside>
  <main class="content" id="main">
    {% block content %}{% endblock %}
  </main>
</div>
<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-text">
  <div class="modal">
    <p id="modal-text"></p>
    <div class="modal-buttons">
      <button class="btn danger" id="modal-confirm">Yes, do it</button>
      <button class="btn" id="modal-cancel">Cancel</button>
    </div>
  </div>
</div>
<div class="bulk-bar" id="bulk-bar" style="display:none" role="region" aria-label="Bulk actions">
  <span id="bulk-count" class="mono">0 selected</span>
  <input type="text" id="bulk-tag-input" placeholder="Add tag(s), comma separated"
    aria-label="Tags to add to selected notes">
  <button class="btn" id="bulk-tag-btn" type="button">Add tag</button>
  <input type="text" id="bulk-move-input" placeholder="Move to category…"
    list="bulk-cat-datalist" aria-label="Category to move selected notes to">
  <datalist id="bulk-cat-datalist"></datalist>
  <button class="btn" id="bulk-move-btn" type="button">Move</button>
  <button class="btn danger" id="bulk-delete-btn" type="button">Delete</button>
  <button class="btn" id="bulk-clear-btn" type="button">Clear</button>
</div>
<script src="/static/app.js?v={{ static_v }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
