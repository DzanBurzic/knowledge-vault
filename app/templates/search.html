{% extends "base.html" %}
{% block title %}Search — Knowledge Vault{% endblock %}
{% block content %}
<h2>Search</h2>
<form id="search-form" class="card-box">
  <div class="search-row">
    <input id="q" name="q" type="text" placeholder="Search your vault…" autofocus>
    <div class="mode-toggle">
      <label><input type="radio" name="mode" value="keyword" checked> Keyword</label>
      <label><input type="radio" name="mode" value="semantic"> By meaning</label>
    </div>
    <button class="btn primary" type="submit">Search</button>
  </div>
  <details class="filters" open>
    <summary>Filters</summary>
    <div class="filter-grid">
      <div class="filter-field">Category
        <div class="cat-picker" id="cat-picker">
          <button type="button" class="cat-picker-btn" aria-haspopup="listbox" aria-expanded="false"
            aria-label="Filter by category">
            <span class="cp-current">All categories</span><span class="chev" aria-hidden="true">▾</span>
          </button>
          <input type="hidden" name="category" value="">
          <div class="cat-picker-panel" role="listbox" aria-label="Categories"></div>
        </div>
      </div>
      <label>Platform
        <select name="platform">
          <option value="">All</option>
          {% for p in platforms %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
        </select>
      </label>
      <label>Tag
        <select name="tag">
          <option value="">All</option>
          {% for t in tags %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
        </select>
      </label>
      <label>From <input type="date" name="date_from"></label>
      <label>To <input type="date" name="date_to"></label>
      <label class="toggle"><input type="checkbox" name="include_done" value="1"> Show done items</label>
    </div>
  </details>
</form>
<div id="search-results"></div>
{% endblock %}
{% block scripts %}
<script>
const form = document.getElementById('search-form');

function tagChips(tags) {
  tags = tags || [];
  const shown = tags.slice(0, 3).map(t => `<span class="tag">#${escapeHtml(t)}</span>`);
  if (tags.length > 3) shown.push(`<span class="tag tag-more">+${tags.length - 3}</span>`);
  return shown.join('');
}

function resultCard(res) {
  const doneBadge = res.status === 'done' ? '<span class="badge">done</span>' : '';
  const matchBadge = res.matched_in_transcript ? '<span class="badge badge-info">matched in transcript</span>' : '';
  const doneBtn = res.status === 'done' ? ''
    : `<button type="button" class="qa-btn qa-done" data-id="${res.id}" aria-label="Mark ${escapeHtml(res.title)} as done" title="Done">✓</button>`;
  const pointsJson = escapeHtml(JSON.stringify(res.main_points || []));
  return `
    <div class="card-box result-card" data-open="/card/${res.id}"
      data-copy-title="${escapeHtml(res.title)}" data-copy-desc="${escapeHtml(res.short_description || '')}"
      data-copy-url="${escapeHtml(res.source_url || '')}" data-copy-points='${pointsJson}'>
      <label class="bulk-select"><input type="checkbox" class="bulk-check" value="${res.id}"
        aria-label="Select ${escapeHtml(res.title)} for bulk actions"></label>
      <div class="rc-top">
        <div class="rc-main">
          <h3 class="rc-title">${escapeHtml(res.title)}</h3>
          <div class="rc-meta">${matchBadge}${doneBadge}
            <span>📁 ${escapeHtml(res.category_path || '—')}</span>
            <span>${escapeHtml(res.platform || '')}</span>
            <span>${escapeHtml(res.date || '')}</span>
          </div>
        </div>
        <div class="rc-actions">
          <a class="qa-btn qa-open" href="/card/${res.id}" aria-label="Open ${escapeHtml(res.title)}" title="Open"
            onclick="event.stopPropagation()">↗</a>
          <button type="button" class="qa-btn qa-copy" aria-label="Copy ${escapeHtml(res.title)}" title="Copy">⧉</button>
          ${doneBtn}
        </div>
      </div>
      ${res.short_description ? `<p class="rc-desc">${escapeHtml(res.short_description)}</p>` : ''}
      <div class="rc-tags">${tagChips(res.tags)}</div>
    </div>`;
}

async function runSearch() {
  const fd = new FormData(form);
  const params = new URLSearchParams();
  for (const [k, v] of fd.entries()) if (v) params.append(k, v);
  const out = document.getElementById('search-results');
  out.innerHTML = '<p class="muted">Searching…</p>';
  clearBulkSelection(); // old checkboxes are about to be replaced
  try {
    const r = await fetch('/api/search?' + params.toString());
    const data = await r.json();
    if (!data.ok) { out.innerHTML = `<div class="empty-state"><p class="error-text">${escapeHtml(data.error)}</p></div>`; return; }
    if (!data.results.length) {
      out.innerHTML = '<div class="empty-state"><p>Nothing found. Try another search or filter.</p></div>';
      return;
    }
    out.innerHTML = data.results.map(resultCard).join('');
  } catch (e) {
    out.innerHTML = '<div class="empty-state"><p class="error-text">Search failed — is the app still running?</p></div>';
  }
}

form.addEventListener('submit', (e) => { e.preventDefault(); runSearch(); });
initCategoryPicker(document.getElementById('cat-picker'), () => runSearch());
</script>
{% endblock %}
