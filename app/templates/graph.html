{% extends "base.html" %}
{% block title %}Graph — Knowledge Vault{% endblock %}
{% block content %}
<p class="eyebrow">Knowledge graph</p>
<div class="graph-wrap">
  <canvas class="graph-canvas" id="graph" aria-label="Knowledge graph of your notes and categories"></canvas>
  <div class="graph-toolbar">
    <input type="text" id="graph-search" class="graph-search" placeholder="Find a note…"
      autocomplete="off" spellcheck="false" aria-label="Find a note in the graph">
    <label class="toggle" style="background:rgba(32,35,49,.85);padding:8px 10px;border-radius:9px;">
      <input type="checkbox" id="graph-archived"> <span>Archived</span>
    </label>
    <span class="graph-count" id="graph-count"></span>
  </div>
  <div class="graph-legend" aria-hidden="true">
    <div><span class="ring"></span> Category</div>
    <div><span class="dot" style="background:#9A9BA8"></span> Note</div>
    <div><span class="dot" style="background:#3B3E50"></span> Done / archived</div>
  </div>
  <div class="graph-cluster" role="group" aria-label="Graph controls">
    <button id="graph-zoom-in" type="button" aria-label="Zoom in" title="Zoom in">+</button>
    <button id="graph-zoom-out" type="button" aria-label="Zoom out" title="Zoom out">−</button>
    <button id="graph-reset" type="button" aria-label="Reset view" title="Reset view">⤢</button>
  </div>
  <div class="graph-hint" aria-hidden="true">Scroll · Drag · Click a node</div>
  <div id="graph-empty" class="empty-state" style="display:none;position:absolute;inset:24px;">
    <p>Your graph is empty — nothing saved yet.</p>
    <p><a class="btn primary" href="/add">Add your first link</a></p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/graph.js"></script>
{% endblock %}
